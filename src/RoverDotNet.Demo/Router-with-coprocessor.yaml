# Apollo Router Configuration
# Propagates all headers from client requests to subgraph services

headers:
  # Propagate all headers to subgraphs
  all:
    request:
      - propagate:
          matching: ".*"

# Optional: Configure telemetry
telemetry:
  instrumentation:
    spans:
      mode: spec_compliant

# RoverDotNet.Coprocessor demo endpoint.
# See: https://www.apollographql.com/docs/graphos/routing/customization/coprocessor
coprocessor:
  url: http://127.0.0.1:8081 # Address of the RoverDotNet.Coprocessor demo host
  timeout: 2s
  router:
    request: # Used by AuthClaimsCoprocessorMiddleware to inject authentication claims
      headers: true
      body: false
      context: all
    response:
      headers: true
      body: false
      context: all
  supergraph:
    request:
      headers: true
      body: true
      context: all
    response:
      headers: true
      body: true
      context: all
  subgraph:
    all:
      request:
        headers: true
        body: true
        context: all
        uri: true
        method: true
        service_name: true
        subgraph_request_id: true
      response:
        headers: true
        body: true
        context: all
        service_name: true
        status_code: true
        subgraph_request_id: true
