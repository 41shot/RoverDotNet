# Products Subgraph Schema
extend schema
  @link(url: "https://specs.apollo.dev/federation/v2.3", import: ["@key", "@shareable"])

type Query {
  product(id: ID!): Product
  products(limit: Int = 10, offset: Int = 0): [Product!]!
  productsByCategory(category: ProductCategory!): [Product!]!
}

type Mutation {
  createProduct(input: CreateProductInput!): Product!
  updateProduct(id: ID!, input: UpdateProductInput!): Product!
  deleteProduct(id: ID!): Boolean!
}

type Product @key(fields: "id") {
  id: ID!
  name: String!
  description: String
  price: Float!
  currency: String!
  category: ProductCategory!
  inStock: Boolean!
  stockQuantity: Int!
  createdBy: User
  createdAt: String!
  updatedAt: String!
}

# Reference to User from users subgraph
type User @key(fields: "id") {
  id: ID!
}

enum ProductCategory {
  ELECTRONICS
  CLOTHING
  BOOKS
  HOME
  SPORTS
  TOYS
  FOOD
  OTHER
}

input CreateProductInput {
  name: String!
  description: String
  price: Float!
  currency: String! = "USD"
  category: ProductCategory!
  stockQuantity: Int!
}

input UpdateProductInput {
  name: String
  description: String
  price: Float
  currency: String
  category: ProductCategory
  inStock: Boolean
  stockQuantity: Int
}
