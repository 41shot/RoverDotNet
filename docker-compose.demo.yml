# Future Docker Compose Configuration
# This file is a template for future containerisation of the demo services

version: '3.8'

services:
  users-service:
    build:
      context: .
      dockerfile: src/RoverDotNet.Demo.Api.Users/Dockerfile
    ports:
      - "4001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    networks:
      - graphql-demo

  products-service:
    build:
      context: .
      dockerfile: src/RoverDotNet.Demo.Api.Products/Dockerfile
    ports:
      - "4002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    networks:
      - graphql-demo

networks:
  graphql-demo:
    driver: bridge

# Note: Dockerfiles need to be created in each project directory
# This is just a template for future containerisation needs
